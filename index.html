<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航天营地报修管理看板</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:#f0f2f5; color:#1a1a2e; }
  .header { background:linear-gradient(135deg,#1a237e,#283593,#1565c0); color:#fff; padding:24px 32px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 20px rgba(21,101,192,.3); }
  .header h1 { font-size:24px; font-weight:700; }
  .header .sub { font-size:13px; opacity:.8; margin-top:4px; }
  .header .update { text-align:right; font-size:13px; opacity:.85; }
  .container { max-width:1400px; margin:0 auto; padding:24px; }
  .kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:24px; }
  .kpi-card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); border-left:4px solid #e0e0e0; }
  .kpi-card.total { border-left-color:#1565c0; }
  .kpi-card.done { border-left-color:#2e7d32; }
  .kpi-card.active { border-left-color:#e65100; }
  .kpi-card.rate { border-left-color:#4527a0; }
  .kpi-card.avg { border-left-color:#00695c; }
  .kpi-label { font-size:12px; color:#757575; }
  .kpi-value { font-size:36px; font-weight:700; margin:8px 0 4px; }
  .kpi-card.total .kpi-value { color:#1565c0; }
  .kpi-card.done .kpi-value { color:#2e7d32; }
  .kpi-card.active .kpi-value { color:#e65100; }
  .kpi-card.rate .kpi-value { color:#4527a0; }
  .kpi-card.avg .kpi-value { color:#00695c; }
  .kpi-sub { font-size:12px; color:#9e9e9e; }

  .charts-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:24px; }
  .chart-card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .chart-title { font-size:14px; font-weight:600; color:#37474f; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid #f5f5f5; }
  .bar-item { display:flex; align-items:center; margin-bottom:10px; font-size:13px; }
  .bar-label { width:80px; text-align:right; margin-right:10px; color:#546e7a; flex-shrink:0; white-space:nowrap; }
  .bar-track { flex:1; height:24px; background:#f5f5f5; border-radius:4px; overflow:hidden; position:relative; }
  .bar-fill { height:100%; border-radius:4px; transition:width .3s; display:flex; align-items:center; padding-left:8px; }
  .bar-fill span { color:#fff; font-size:11px; font-weight:600; }

  .status-pie { display:flex; align-items:center; justify-content:center; gap:40px; }
  .pie-svg circle { transition:stroke-dashoffset .5s; }
  .pie-legend { display:flex; flex-direction:column; gap:10px; }
  .pie-legend-item { display:flex; align-items:center; gap:8px; font-size:13px; color:#546e7a; }
  .pie-legend-dot { width:12px; height:12px; border-radius:3px; }
  .pie-legend-item b { color:#37474f; }

  .sla-bars { display:flex; align-items:flex-end; justify-content:center; gap:12px; height:140px; padding-top:10px; }
  .sla-col { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
  .sla-bar { width:100%; border-radius:4px 4px 0 0; min-height:4px; transition:height .3s; }
  .sla-count { font-size:12px; font-weight:700; }
  .sla-label { font-size:11px; color:#90a4ae; text-align:center; line-height:1.3; }

  .alert-section { background:#fff; border-radius:12px; padding:20px; margin-bottom:24px; box-shadow:0 2px 12px rgba(0,0,0,.06); border-left:4px solid #e65100; }
  .alert-title { font-size:14px; font-weight:600; color:#e65100; margin-bottom:12px; }
  .alert-items { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .alert-item { background:#fff3e0; border-radius:8px; padding:12px; border-left:3px solid #e65100; }
  .alert-item .room { font-weight:700; font-size:13px; color:#bf360c; }
  .alert-item .desc { font-size:12px; color:#5d4037; margin-top:3px; }
  .alert-item .meta { font-size:11px; color:#8d6e63; margin-top:5px; }

  .table-section { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:24px; }
  .table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #f5f5f5; }
  .filter-btn { padding:5px 14px; border-radius:20px; border:1px solid #e0e0e0; background:#fff; font-size:12px; cursor:pointer; color:#616161; margin-left:8px; }
  .filter-btn.active { background:#1565c0; color:#fff; border-color:#1565c0; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:#f8f9fa; padding:10px 8px; text-align:left; font-size:12px; font-weight:600; color:#546e7a; border-bottom:2px solid #e9ecef; white-space:nowrap; }
  tbody td { padding:8px; border-bottom:1px solid #f5f5f5; }
  tbody tr:hover { background:#f8fbff; }
  .type-badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; white-space:nowrap; }
  .status-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 12px; border-radius:12px; font-size:11px; font-weight:600; white-space:nowrap; }
  .status-已完成 { background:#e8f5e9; color:#2e7d32; }
  .status-处理中 { background:#fff3e0; color:#e65100; }
  .status-待处理 { background:#fce4ec; color:#c62828; }
  .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .dot-已完成 { background:#4caf50; }
  .dot-处理中 { background:#ff9800; animation:pulse 1.5s infinite; }
  .dot-待处理 { background:#f44336; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .monthly-section { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:24px; }
  .monthly-title { font-size:14px; font-weight:600; color:#37474f; margin-bottom:16px; }
  .monthly-bars { display:flex; gap:12px; align-items:flex-end; height:80px; }
  .m-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .m-bar { width:100%; border-radius:4px 4px 0 0; min-height:4px; background:linear-gradient(180deg,#42a5f5,#1565c0); }
  .m-count { font-size:11px; font-weight:700; color:#1565c0; }
  .m-label { font-size:10px; color:#90a4ae; }

  .footer { text-align:center; padding:20px; font-size:12px; color:#bdbdbd; }

  #loading { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,.97); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; font-size:16px; color:#1565c0; gap:16px; transition:opacity .3s; }
  .spinner { width:40px; height:40px; border:3px solid #e3f2fd; border-top:3px solid #1565c0; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }

  @media (max-width:1100px) {
    .kpi-row { grid-template-columns:repeat(3,1fr); }
    .charts-row { grid-template-columns:1fr 1fr; }
    .alert-items { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  正在加载报修数据...
  <div style="font-size:12px;color:#999;margin-top:8px;" id="loadStatus"></div>
</div>

<div class="header">
  <div>
    <h1>航天营地报修管理看板</h1>
    <div class="sub">群：航天营地日常对接群 | 数据来源：钉钉群消息</div>
  </div>
  <div class="update">
    <div id="periodDisplay">统计周期：—</div>
    <div style="font-size:12px;opacity:.7;margin-top:4px;" id="updateTime">最后更新：—</div>
  </div>
</div>

<div class="container">
  <div class="kpi-row">
    <div class="kpi-card total"><div class="kpi-label">总报修数</div><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-sub">累计报修</div></div>
    <div class="kpi-card done"><div class="kpi-label">已完成</div><div class="kpi-value" id="kpiDone">—</div><div class="kpi-sub" id="kpiDoneSub">—</div></div>
    <div class="kpi-card active"><div class="kpi-label">处理中</div><div class="kpi-value" id="kpiActive">—</div><div class="kpi-sub" id="kpiActiveSub">—</div></div>
    <div class="kpi-card rate"><div class="kpi-label">完成率</div><div class="kpi-value" id="kpiRate">—</div><div class="kpi-sub" id="kpiRateSub">—</div></div>
    <div class="kpi-card avg"><div class="kpi-label">平均时效</div><div class="kpi-value" id="kpiAvg">—</div><div class="kpi-sub">天（已完成）</div></div>
  </div>

  <div class="alert-section" id="alertSection" style="display:none">
    <div class="alert-title" id="alertTitle">—</div>
    <div id="alertItems" class="alert-items"></div>
  </div>

  <div class="charts-row">
    <div class="chart-card"><div class="chart-title">问题类型分布</div><div id="typeBars"></div></div>
    <div class="chart-card"><div class="chart-title">完成状态占比</div><div class="status-pie" id="statusPie"></div></div>
    <div class="chart-card"><div class="chart-title">处理时效分布（已完成）</div><div class="sla-bars" id="slaBars"></div></div>
  </div>

  <div class="monthly-section">
    <div class="monthly-title">月度报修趋势</div>
    <div class="monthly-bars" id="monthlyBars"></div>
  </div>

  <div class="table-section">
    <div class="table-header">
      <div style="font-size:15px;font-weight:600;color:#37474f;" id="tableTitle">报修台账明细</div>
      <div>
        <button class="filter-btn active" onclick="filterTable('all',this)">全部</button>
        <button class="filter-btn" onclick="filterTable('已完成',this)">已完成</button>
        <button class="filter-btn" onclick="filterTable('处理中',this)">处理中</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>#</th><th>报修日期</th><th>报修人</th><th>地点</th><th>问题描述</th><th>类型</th><th>状态</th><th>完成日期</th><th>时效</th><th>处理人</th><th>备注</th></tr></thead>
        <tbody id="repairTableBody"></tbody>
      </table>
    </div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid #f5f5f5;font-size:12px;color:#9e9e9e;" id="tableFooter">—</div>
  </div>
</div>

<div class="footer">航天营地报修管理看板 · 数据来源：钉钉群消息记录 · 每2小时自动更新</div>

<script>
// ===== 类型颜色映射 =====
var TYPE_COLORS = {
  '门锁故障':'#3949ab','空调故障':'#1565c0','漏水问题':'#006064','电气故障':'#e65100',
  '电器损坏':'#880e4f','管道堵塞':'#6a1b9a','供水故障':'#1b5e20','照明故障':'#f57f17',
  '综合维修':'#37474f','网络故障':'#004d40','饮水机故障':'#2e7d32','电梯故障':'#4e342e'
};
var TYPE_BG = {
  '门锁故障':'#e8eaf6','空调故障':'#e3f2fd','漏水问题':'#e0f7fa','电气故障':'#fff8e1',
  '电器损坏':'#fce4ec','管道堵塞':'#f3e5f5','供水故障':'#e8f5e9','照明故障':'#fffde7',
  '综合维修':'#eceff1','网络故障':'#e0f2f1','饮水机故障':'#e8f5e9','电梯故障':'#efebe9'
};

var repairData = [];

// ===== 安全隐藏loading =====
function hideLoading(msg) {
  var el = document.getElementById('loading');
  if (!el) return;
  if (msg) { el.innerHTML = msg; return; }
  el.style.opacity = '0';
  setTimeout(function() { el.style.display = 'none'; }, 300);
}

// ===== 设置加载状态文字 =====
function setStatus(txt) {
  var el = document.getElementById('loadStatus');
  if (el) el.textContent = txt;
}

// ===== 加载数据 =====
function loadData() {
  setStatus('正在获取数据...');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'data.json?t=' + Date.now(), true);
  xhr.timeout = 15000;

  xhr.onload = function() {
    setStatus('数据已接收，正在解析...');
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        if (!data || !data.records) throw new Error('数据结构无效');
        repairData = data.records || [];
        setStatus('正在渲染看板...');
        renderDashboard(data);
        hideLoading();
      } catch(e) {
        showError('数据解析失败: ' + e.message);
      }
    } else {
      showError('HTTP ' + xhr.status);
    }
  };

  xhr.onerror = function() {
    showError('网络请求失败，请检查网络连接');
  };

  xhr.ontimeout = function() {
    showError('请求超时（15秒），请刷新重试');
  };

  xhr.send();
}

function showError(msg) {
  console.error('看板加载失败:', msg);
  hideLoading(
    '<div style="text-align:center;color:#c62828;font-size:16px;padding:40px;">' +
    '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
    '数据加载失败' +
    '<br><small style="color:#999;display:block;margin-top:8px;">' + msg + '</small>' +
    '<br><button onclick="location.reload()" style="margin-top:12px;padding:8px 24px;border-radius:6px;border:none;background:#1565c0;color:#fff;cursor:pointer;font-size:14px;">刷新重试</button>' +
    '<br><small style="color:#ccc;display:block;margin-top:8px;">看板地址: raybane26.github.io/repair-dashboard</small>' +
    '</div>'
  );
}

// ===== 超时保护：15秒后强制隐藏loading =====
setTimeout(function() {
  var el = document.getElementById('loading');
  if (el && el.style.display !== 'none' && el.style.opacity !== '0') {
    showError('加载超时，请刷新页面重试');
  }
}, 18000);

// ===== 渲染看板 =====
function renderDashboard(data) {
  var records = data.records || [];
  var stats = data.stats || {};
  var now = new Date();

  records.forEach(function(r) {
    if (r.status === '处理中' && r.date) {
      r._daysOpen = Math.floor((now - new Date(r.date)) / 86400000);
    } else {
      r._daysOpen = null;
    }
  });

  var total = stats.total || records.length;
  var completed = stats.completed || records.filter(function(r) { return r.status === '已完成'; }).length;
  var inProgress = stats.inProgress || records.filter(function(r) { return r.status === '处理中'; }).length;
  var rate = stats.completionRate || (total > 0 ? Math.round(completed/total*100) : 0);
  var avgTimeliness = stats.avgTimeliness || '—';

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiDone').textContent = completed;
  document.getElementById('kpiDoneSub').textContent = '完成修复';
  document.getElementById('kpiActive').textContent = inProgress;
  document.getElementById('kpiActiveSub').textContent = inProgress > 0 ? '需跟进' : '全部完成';
  document.getElementById('kpiRate').textContent = rate + '%';
  document.getElementById('kpiRateSub').textContent = completed + '/' + total + ' 已关闭';
  document.getElementById('kpiAvg').textContent = avgTimeliness;
  document.getElementById('updateTime').textContent = '最后更新：' + (data.lastUpdate || '—');

  if (records.length > 0) {
    var dates = records.map(function(r) { return r.date; }).filter(Boolean).sort();
    document.getElementById('periodDisplay').textContent =
      '统计周期：' + (dates[0] || '—') + ' — ' + (dates[dates.length-1] || '—');
  }

  // 未完成警告
  var activeItems = records.filter(function(r) { return r.status === '处理中'; });
  var alertSection = document.getElementById('alertSection');
  if (activeItems.length > 0) {
    alertSection.style.display = 'block';
    document.getElementById('alertTitle').textContent = '当前未完成报修（' + activeItems.length + ' 项）—— 需跟进反馈';
    document.getElementById('alertItems').innerHTML = activeItems.map(function(r) {
      var days = r._daysOpen;
      var daysStr = days !== null && days >= 0 ? ('已超 ' + days + ' 天') : '当天报修';
      if (days >= 3) daysStr += ' ⚠️';
      return '<div class="alert-item">' +
        '<div class="room">' + (r.location || '—') + '</div>' +
        '<div class="desc">' + (r.problem || r.issue || '—').substring(0, 60) + '</div>' +
        '<div class="meta">报修人：' + (r.reporter || '—') + ' | ' + daysStr + '</div>' +
      '</div>';
    }).join('');
  } else {
    alertSection.style.display = 'none';
  }

  // 更新筛选按钮
  document.querySelectorAll('.filter-btn')[0].textContent = '全部 (' + total + ')';
  document.querySelectorAll('.filter-btn')[1].textContent = '已完成 (' + completed + ')';
  document.querySelectorAll('.filter-btn')[2].textContent = '处理中 (' + inProgress + ')';

  // 渲染各部分
  renderTable('all');
  renderTypeBars(records);
  renderStatusPie(completed, inProgress, records.length - completed - inProgress);
  renderSlaChart(records);
  renderMonthlyTrend(records);
}

// ===== 问题类型柱状图（纯CSS） =====
function renderTypeBars(records) {
  var counts = {};
  records.forEach(function(r) {
    var t = r.type || '其他';
    counts[t] = (counts[t] || 0) + 1;
  });
  var entries = Object.entries(counts).sort(function(a,b) { return b[1]-a[1]; });
  var maxVal = entries.length > 0 ? Math.max.apply(null, entries.map(function(e) { return e[1]; })) : 1;

  if (entries.length === 0) {
    document.getElementById('typeBars').innerHTML = '<div style="text-align:center;color:#bdbdbd;padding:40px;">暂无数据</div>';
    return;
  }

  document.getElementById('typeBars').innerHTML = entries.map(function(e) {
    var color = TYPE_COLORS[e[0]] || '#455a64';
    var pct = Math.round(e[1]/maxVal*100);
    return '<div class="bar-item">' +
      '<div class="bar-label">' + e[0] + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"><span>' + e[1] + '</span></div></div>' +
    '</div>';
  }).join('');
}

// ===== 状态饼图（纯CSS SVG） =====
function renderStatusPie(done, active, pending) {
  var total = done + active + pending || 1;
  var donePct = Math.round(done/total*100);

  document.getElementById('statusPie').innerHTML =
    '<div style="position:relative;width:140px;height:140px;">' +
    '<svg viewBox="0 0 36 36" style="width:100%;height:100%;">' +
    '<circle cx="18" cy="18" r="15.9" fill="none" stroke="#f5f5f5" stroke-width="2.5"/>' +
    '<circle cx="18" cy="18" r="15.9" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="' + (done/total*100).toFixed(1) + ', 100" stroke-linecap="round" transform="rotate(-90,18,18)"/>' +
    '</svg>' +
    '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">' +
    '<div style="font-size:24px;font-weight:700;color:#2e7d32;">' + donePct + '%</div>' +
    '<div style="font-size:11px;color:#9e9e9e;">完成率</div>' +
    '</div>' +
    '</div>' +
    '<div class="pie-legend">' +
    '<div class="pie-legend-item"><div class="pie-legend-dot" style="background:#4caf50;"></div>已完成 <b>' + done + '</b></div>' +
    '<div class="pie-legend-item"><div class="pie-legend-dot" style="background:#ff9800;"></div>处理中 <b>' + active + '</b></div>' +
    (pending > 0 ? '<div class="pie-legend-item"><div class="pie-legend-dot" style="background:#f44336;"></div>待处理 <b>' + pending + '</b></div>' : '') +
    '</div>';
}

// ===== 时效分布条形图（纯CSS） =====
function renderSlaChart(records) {
  var buckets = {'当天':0, '1天':0, '2天':0, '3-4天':0, '5-7天':0, '8天+':0};
  records.filter(function(r) { return r.status === '已完成'; }).forEach(function(r) {
    var d = Number(r.timeliness);
    if (isNaN(d)) return;
    if (d === 0) buckets['当天']++;
    else if (d === 1) buckets['1天']++;
    else if (d === 2) buckets['2天']++;
    else if (d <= 4) buckets['3-4天']++;
    else if (d <= 7) buckets['5-7天']++;
    else buckets['8天+']++;
  });
  var maxVal = Math.max.apply(null, Object.values(buckets).concat([1]));
  var colors = ['#4caf50','#8bc34a','#ff9800','#ff7043','#f44336','#b71c1c'];

  document.getElementById('slaBars').innerHTML = Object.entries(buckets).map(function(e, i) {
    var h = Math.max(4, Math.round(e[1]/maxVal*120));
    return '<div class="sla-col">' +
      '<div class="sla-count" style="color:' + colors[i] + '">' + e[1] + '</div>' +
      '<div class="sla-bar" style="height:' + h + 'px;background:' + colors[i] + ';"></div>' +
      '<div class="sla-label">' + e[0] + '</div>' +
    '</div>';
  }).join('');
}

// ===== 月度趋势 =====
function renderMonthlyTrend(records) {
  var counts = {};
  records.forEach(function(r) {
    if (!r.date) return;
    var m = r.date.substring(0,7);
    counts[m] = (counts[m]||0) + 1;
  });
  var sorted = Object.keys(counts).sort();
  var maxVal = Math.max.apply(null, Object.values(counts).concat([1]));
  var now = new Date();
  var curMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  document.getElementById('monthlyBars').innerHTML = sorted.map(function(m) {
    var c = counts[m];
    var h = Math.max(4, Math.round(c/maxVal*60));
    var isCur = m === curMonth;
    return '<div class="m-bar-wrap">' +
      '<div class="m-count">' + c + '</div>' +
      '<div class="m-bar" style="height:' + h + 'px;' + (isCur ? 'background:linear-gradient(180deg,#ffb74d,#e65100)' : '') + '"></div>' +
      '<div class="m-label">' + parseInt(m.split('-')[1]) + '月</div>' +
    '</div>';
  }).join('');
}

// ===== 筛选表格 =====
function filterTable(status, btn) {
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }
  renderTable(status);
}

function renderTable(filter) {
  filter = filter || 'all';
  var rows = filter === 'all' ? repairData : repairData.filter(function(r) { return r.status === filter; });
  var tbody = document.getElementById('repairTableBody');
  var total = repairData.length;

  tbody.innerHTML = rows.map(function(r, i) {
    var tid = r['#'] || r.id || (i+1);
    var typeName = r.type || '—';
    var typeClass = 'type-' + typeName.replace(/\s/g,'');
    var bg = TYPE_BG[typeName] || '#eceff1';
    var color = TYPE_COLORS[typeName] || '#37474f';

    // 时效显示
    var timeliness = '';
    if (r.status === '已完成') {
      var d = Number(r.timeliness);
      if (isNaN(d) || r.timeliness === '' || r.timeliness === null) {
        timeliness = '—';
      } else if (d === 0) {
        timeliness = '当天';
      } else {
        timeliness = d + '天';
      }
    } else {
      timeliness = '进行中';
    }

    return '<tr>' +
      '<td style="font-weight:600;color:#90a4ae;font-size:12px;">#' + tid + '</td>' +
      '<td style="white-space:nowrap;">' + (r.date || '—') + '</td>' +
      '<td>' + (r.reporter || '—') + '</td>' +
      '<td style="font-weight:600;color:#1565c0;">' + (r.location || '—') + '</td>' +
      '<td style="max-width:200px;">' + (r.problem || r.issue || '—') + '</td>' +
      '<td><span class="type-badge" style="background:' + bg + ';color:' + color + ';">' + typeName + '</span></td>' +
      '<td><span class="status-badge status-' + r.status + '"><span class="dot dot-' + r.status + '"></span>' + r.status + '</span></td>' +
      '<td style="white-space:nowrap;">' + (r.completedDate || r.complete_date || '—') + '</td>' +
      '<td>' + timeliness + '</td>' +
      '<td>' + (r.handler || '—') + '</td>' +
      '<td style="font-size:12px;color:#78909c;max-width:150px;">' + (r.note || '') + '</td>' +
    '</tr>';
  }).join('');

  document.getElementById('tableTitle').textContent = '报修台账明细（共 ' + total + ' 条）';
  document.getElementById('tableFooter').textContent = '显示 ' + rows.length + ' 条' + (filter !== 'all' ? ' （筛选中）' : '');
}

// ===== 启动 =====
loadData();
</script>
