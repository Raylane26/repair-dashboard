<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航天营地报修管理看板</title>
<meta property="og:title" content="航天营地报修管理看板" />
<meta property="og:description" content="实时查看报修台账、完成率统计、问题类型分析、超期预警" />
<meta property="og:url" content="https://Raylane26.github.io/repair-dashboard" />
<meta property="og:type" content="website" />
<meta name="description" content="航天营地报修管理看板 - 实时查看报修台账、统计图表、超期预警" />
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
if (typeof Chart === 'undefined') {
  document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>');
}
</script>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f2f5; color: #1a1a2e;
  }
  .header {
    background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
    color: white; padding: 24px 32px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(21,101,192,0.3);
  }
  .header-left h1 { font-size: 24px; font-weight: 700; }
  .header-left p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .header-right { text-align: right; font-size: 13px; opacity: 0.85; }
  .header-right .update-time { font-size: 12px; opacity: 0.7; margin-top: 4px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: white; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 4px solid #e0e0e0;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .kpi-card.total  { border-left-color: #1565c0; }
  .kpi-card.done   { border-left-color: #2e7d32; }
  .kpi-card.active { border-left-color: #e65100; }
  .kpi-card.rate   { border-left-color: #4527a0; }
  .kpi-card.avg    { border-left-color: #00695c; }
  .kpi-label { font-size: 12px; color: #757575; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 36px; font-weight: 700; margin: 8px 0 4px; }
  .kpi-card.total  .kpi-value { color: #1565c0; }
  .kpi-card.done   .kpi-value { color: #2e7d32; }
  .kpi-card.active .kpi-value { color: #e65100; }
  .kpi-card.rate   .kpi-value { color: #4527a0; }
  .kpi-card.avg    .kpi-value { color: #00695c; }
  .kpi-sub { font-size: 12px; color: #9e9e9e; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .chart-title { font-size: 14px; font-weight: 600; color: #37474f; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5; }
  .chart-container { position: relative; height: 200px; }
  .alert-section {
    background: white; border-radius: 12px; padding: 20px;
    margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-left: 4px solid #e65100;
  }
  .alert-title { font-size: 14px; font-weight: 600; color: #e65100; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .alert-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .alert-item { background: #fff3e0; border-radius: 8px; padding: 12px 14px; border-left: 3px solid #e65100; }
  .alert-item .room { font-weight: 700; font-size: 13px; color: #bf360c; }
  .alert-item .desc { font-size: 12px; color: #5d4037; margin-top: 3px; line-height: 1.5; }
  .alert-item .reporter { font-size: 11px; color: #8d6e63; margin-top: 5px; }
  .alert-item .days { font-size: 11px; color: #e65100; font-weight: 600; margin-top: 2px; }
  .table-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 24px; }
  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f5f5f5; }
  .table-title { font-size: 15px; font-weight: 600; color: #37474f; }
  .filter-group { display: flex; gap: 8px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #e0e0e0; background: white; font-size: 12px; cursor: pointer; transition: all 0.2s; color: #616161; }
  .filter-btn:hover { border-color: #1565c0; color: #1565c0; }
  .filter-btn.active { background: #1565c0; color: white; border-color: #1565c0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; color: #546e7a; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 2px solid #e9ecef; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.15s; }
  tbody tr:hover { background: #f8fbff; }
  tbody td { padding: 10px 12px; vertical-align: middle; }
  .id-cell { font-weight: 600; color: #90a4ae; font-size: 12px; }
  .date-cell { color: #546e7a; white-space: nowrap; }
  .location-cell { font-weight: 600; color: #1565c0; white-space: nowrap; }
  .issue-cell { color: #37474f; max-width: 220px; }
  .reporter-cell { color: #546e7a; white-space: nowrap; }
  .type-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .type-门锁故障  { background: #e8eaf6; color: #3949ab; }
  .type-空调故障  { background: #e3f2fd; color: #1565c0; }
  .type-漏水问题  { background: #e0f7fa; color: #006064; }
  .type-电气故障  { background: #fff8e1; color: #e65100; }
  .type-电器损坏  { background: #fce4ec; color: #880e4f; }
  .type-管道堵塞  { background: #f3e5f5; color: #6a1b9a; }
  .type-供水故障  { background: #e8f5e9; color: #1b5e20; }
  .type-照明故障  { background: #fffde7; color: #f57f17; }
  .type-综合维修  { background: #eceff1; color: #37474f; }
  .type-网络故障  { background: #e0f2f1; color: #004d40; }
  .type-饮水机故障 { background: #e8f5e9; color: #2e7d32; }
  .type-电梯故障  { background: #efebe9; color: #4e342e; }
  .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .status-已完成 { background: #e8f5e9; color: #2e7d32; }
  .status-处理中 { background: #fff3e0; color: #e65100; }
  .status-待处理 { background: #fce4ec; color: #c62828; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .dot-已完成 { background: #4caf50; }
  .dot-处理中 { background: #ff9800; animation: pulse 1.5s infinite; }
  .dot-待处理 { background: #f44336; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .days-cell { text-align: center; }
  .days-0 { color: #4caf50; font-weight: 600; }
  .days-1 { color: #4caf50; }
  .days-2, .days-3 { color: #ff9800; }
  .days-4, .days-5, .days-6, .days-7 { color: #f44336; }
  .days-long { color: #b71c1c; font-weight: 700; }
  .days-na { color: #bdbdbd; font-style: italic; }
  .note-cell { color: #78909c; font-size: 12px; max-width: 180px; }
  .table-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f5f5f5; font-size: 12px; color: #9e9e9e; }
  .timeline-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 24px; }
  .timeline-title { font-size: 14px; font-weight: 600; color: #37474f; margin-bottom: 16px; }
  .monthly-bars { display: flex; gap: 12px; align-items: flex-end; height: 80px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; background: linear-gradient(180deg, #42a5f5, #1565c0); transition: all 0.3s; position: relative; }
  .bar:hover { filter: brightness(1.1); }
  .bar-label { font-size: 10px; color: #90a4ae; }
  .bar-count { font-size: 11px; font-weight: 700; color: #1565c0; }
  .footer { text-align: center; padding: 20px; font-size: 12px; color: #bdbdbd; }
  .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-size: 16px; color: #1565c0; gap: 16px; transition: opacity 0.3s; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid #e3f2fd; border-top: 3px solid #1565c0; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .charts-row { grid-template-columns: 1fr 1fr; }
    .alert-items { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  正在加载报修数据...
</div>

<div class="header">
  <div class="header-left">
    <h1>航天营地报修管理看板</h1>
    <p>群：航天营地日常对接群 | 数据来源：钉钉群消息</p>
  </div>
  <div class="header-right">
    <div id="periodDisplay">统计周期：—</div>
    <div class="update-time" id="updateTime">最后更新：—</div>
  </div>
</div>

<div class="container">

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi-card total"><div class="kpi-label">总报修数</div><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-sub" id="kpiTotalSub">—</div></div>
    <div class="kpi-card done"><div class="kpi-label">已完成</div><div class="kpi-value" id="kpiDone">—</div><div class="kpi-sub" id="kpiDoneSub">—</div></div>
    <div class="kpi-card active"><div class="kpi-label">处理中</div><div class="kpi-value" id="kpiActive">—</div><div class="kpi-sub" id="kpiActiveSub">—</div></div>
    <div class="kpi-card rate"><div class="kpi-label">完成率</div><div class="kpi-value" id="kpiRate">—</div><div class="kpi-sub" id="kpiRateSub">—</div></div>
    <div class="kpi-card avg"><div class="kpi-label">平均时效</div><div class="kpi-value" id="kpiAvg">—</div><div class="kpi-sub" id="kpiAvgSub">—</div></div>
  </div>

  <!-- 未完成警告 -->
  <div class="alert-section" id="alertSection" style="display:none;">
    <div class="alert-title"><span id="alertTitle">—</span></div>
    <div class="alert-items" id="alertItems"></div>
  </div>

  <!-- Charts Row -->
  <div class="charts-row">
    <div class="chart-card"><div class="chart-title">问题类型分布</div><div class="chart-container"><canvas id="typeChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">完成状态占比</div><div class="chart-container"><canvas id="statusChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">处理时效分布（已完成）</div><div class="chart-container"><canvas id="slaChart"></canvas></div></div>
  </div>

  <!-- Monthly Trend -->
  <div class="timeline-section">
    <div class="timeline-title">月度报修趋势</div>
    <div class="monthly-bars" id="monthlyBars"></div>
  </div>

  <!-- Table -->
  <div class="table-section">
    <div class="table-header">
      <div class="table-title" id="tableTitle">报修台账明细</div>
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterTable('all', this)" id="btnAll">全部</button>
        <button class="filter-btn" onclick="filterTable('已完成', this)" id="btnDone">已完成</button>
        <button class="filter-btn" onclick="filterTable('处理中', this)" id="btnActive">处理中</button>
      </div>
    </div>
    <table id="repairTable">
      <thead>
        <tr>
          <th>#</th><th>报修日期</th><th>报修人</th><th>地点</th><th>问题描述</th><th>问题类型</th><th>状态</th><th>完成日期</th><th>时效</th><th>处理人</th><th>备注</th>
        </tr>
      </thead>
      <tbody id="repairTableBody"></tbody>
    </table>
    <div class="table-footer" id="tableFooter">—</div>
  </div>

</div>

<div class="footer">航天营地报修管理看板 · 数据来源：钉钉群"航天营地日常对接群"消息记录 · 每2小时自动更新</div>

<script>
// ===== 全局状态 =====
var repairData = [];
var charts = {};

// ===== 工具：安全隐藏 loading =====
function hideLoading(msg) {
  var el = document.getElementById('loading');
  if (!el) return;
  if (msg) { el.innerHTML = msg; return; }
  el.style.opacity = '0';
  setTimeout(function() { el.style.display = 'none'; }, 300);
}

// ===== 加载数据 =====
async function loadData() {
  try {
    // 设置超时（15秒）
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 15000);

    var resp = await fetch('data.json?t=' + Date.now(), { signal: controller.signal });
    clearTimeout(timeoutId);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    if (!data || !data.records) throw new Error('数据格式无效');
    repairData = data.records || [];
    renderDashboard(data);
    hideLoading();
  } catch(e) {
    console.error('看板加载失败:', e);
    var errMsg = e.name === 'AbortError' ? '请求超时（15秒）' : e.message;
    hideLoading('<div style="text-align:center;color:#c62828;font-size:16px;padding:40px;">' +
      '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
      '数据加载失败<br><small style="color:#999;display:block;margin-top:8px;">' + errMsg + '</small>' +
      '<br><br><button onclick="location.reload()" style="padding:8px 20px;border-radius:6px;border:none;background:#1565c0;color:white;cursor:pointer;font-size:14px;">刷新重试</button>' +
      '</div>');
  }
}

// ===== 渲染看板 =====
function renderDashboard(data) {
  var records = data.records || [];
  var stats = data.stats || {};
  var now = new Date();

  // 计算超期天数
  records.forEach(function(r) {
    if (r.status === '处理中' && r.date) {
      r._daysOpen = Math.floor((now - new Date(r.date)) / 86400000);
    } else {
      r._daysOpen = null;
    }
  });

  var activeItems = records.filter(function(r) { return r.status === '处理中'; });

  // 更新时间 & 周期
  document.getElementById('updateTime').textContent = '最后更新：' + (data.lastUpdate || '—');
  if (records.length > 0) {
    var dates = records.map(function(r) { return r.date; }).filter(Boolean).sort();
    document.getElementById('periodDisplay').textContent =
      '统计周期：' + (dates[0] || '—') + ' — ' + (dates[dates.length-1] || '—');
  }

  // KPI
  var total = stats.total || records.length;
  var completed = stats.completed || records.filter(function(r) { return r.status === '已完成'; }).length;
  var inProgress = stats.inProgress || records.filter(function(r) { return r.status === '处理中'; }).length;
  var rate = stats.completionRate || (total > 0 ? Math.round(completed/total*100) : 0);

  var completedRecords = records.filter(function(r) { return r.status === '已完成' && r.timeliness !== null && r.timeliness !== undefined && r.timeliness !== ''; });
  var avgTimeliness = completedRecords.length > 0
    ? (completedRecords.reduce(function(s,r) { return s + (Number(r.timeliness)||0); }, 0) / completedRecords.length).toFixed(1)
    : (stats.avgTimeliness || '—');

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiTotalSub').textContent = '累计报修';
  document.getElementById('kpiDone').textContent = completed;
  document.getElementById('kpiDoneSub').textContent = '完成修复';
  document.getElementById('kpiActive').textContent = inProgress;
  document.getElementById('kpiActiveSub').textContent = inProgress > 0 ? '需跟进' : '全部完成';
  document.getElementById('kpiRate').textContent = rate + '%';
  document.getElementById('kpiRateSub').textContent = completed + '/' + total + ' 已关闭';
  document.getElementById('kpiAvg').textContent = avgTimeliness;
  document.getElementById('kpiAvgSub').textContent = '天（已完成）';

  // 未完成警告
  var alertSection = document.getElementById('alertSection');
  if (activeItems.length > 0) {
    alertSection.style.display = 'block';
    document.getElementById('alertTitle').textContent =
      '当前未完成报修（' + activeItems.length + ' 项）—— 需跟进反馈';
    document.getElementById('alertItems').innerHTML = activeItems.map(function(r) {
      var days = r._daysOpen;
      var daysStr = days !== null ? ('已超 ' + days + ' 天未完成') : '进行中';
      return '<div class="alert-item">' +
        '<div class="room">' + (r.location || '—') + '</div>' +
        '<div class="desc">' + (r.problem || r.issue || '—').substring(0, 80) + '</div>' +
        '<div class="reporter">报修人：' + (r.reporter || '—') + '</div>' +
        '<div class="days">' + daysStr + '</div>' +
      '</div>';
    }).join('');
  } else {
    alertSection.style.display = 'none';
  }

  // 过滤按钮
  document.getElementById('btnAll').textContent = '全部 (' + total + ')';
  document.getElementById('btnDone').textContent = '已完成 (' + completed + ')';
  document.getElementById('btnActive').textContent = '处理中 (' + inProgress + ')';

  // 渲染表格
  renderTable();

  // 图表
  try { renderCharts(records); } catch(e) { console.warn('图表渲染失败:', e); }
  try { renderMonthlyTrend(records); } catch(e) { console.warn('月度趋势渲染失败:', e); }
}

function getDaysHtml(r) {
  var days = r.timeliness;
  if (days === null || days === undefined || days === '') return '<span class="days-na">进行中</span>';
  var d = Number(days);
  if (d === 0) return '<span class="days-0">当天</span>';
  if (d <= 1) return '<span class="days-1">' + d + '天</span>';
  if (d <= 3) return '<span class="days-2">' + d + '天</span>';
  if (d <= 7) return '<span class="days-4">' + d + '天</span>';
  return '<span class="days-long">' + d + '天</span>';
}

function renderTable(filter) {
  filter = filter || 'all';
  var tbody = document.getElementById('repairTableBody');
  var footer = document.getElementById('tableFooter');
  var rows = filter === 'all' ? repairData : repairData.filter(function(r) { return r.status === filter; });
  tbody.innerHTML = rows.map(function(r) {
    return '<tr data-status="' + r.status + '">' +
      '<td class="id-cell">#' + (r['#'] || r.id || '') + '</td>' +
      '<td class="date-cell">' + (r.date || '—') + '</td>' +
      '<td class="reporter-cell">' + (r.reporter || '—') + '</td>' +
      '<td class="location-cell">' + (r.location || '—') + '</td>' +
      '<td class="issue-cell">' + (r.problem || r.issue || '—') + '</td>' +
      '<td><span class="type-badge type-' + (r.type||'').replace(/\s/g,'') + '">' + (r.type || '—') + '</span></td>' +
      '<td><span class="status-badge status-' + r.status + '"><span class="dot dot-' + r.status + '"></span>' + r.status + '</span></td>' +
      '<td class="date-cell">' + (r.completedDate || r.complete_date || '—') + '</td>' +
      '<td class="days-cell">' + (r.status === '已完成' ? getDaysHtml(r) : '<span class="days-na">进行中</span>') + '</td>' +
      '<td class="reporter-cell">' + (r.handler || '—') + '</td>' +
      '<td class="note-cell">' + (r.note || '') + '</td>' +
    '</tr>';
  }).join('');
  document.getElementById('tableTitle').textContent = '报修台账明细（共 ' + repairData.length + ' 条）';
  footer.textContent = '显示 ' + rows.length + ' 条' + (filter !== 'all' ? ' （筛选中）' : '');
}

function filterTable(status, btn) {
  var buttons = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
  btn.classList.add('active');
  renderTable(status);
}

function renderCharts(records) {
  if (typeof Chart === 'undefined') return;

  Object.values(charts).forEach(function(c) { try { c.destroy(); } catch(e){} });
  charts = {};

  // 问题类型
  var typeCounts = {};
  records.forEach(function(r) { var t = r.type || '其他'; typeCounts[t] = (typeCounts[t]||0) + 1; });
  var typeEntries = Object.entries(typeCounts).sort(function(a,b) { return b[1]-a[1]; });
  var typeColors = {'门锁故障':'#3949ab','空调故障':'#1565c0','漏水问题':'#006064','电气故障':'#e65100','电器损坏':'#880e4f','管道堵塞':'#6a1b9a','供水故障':'#1b5e20','照明故障':'#f57f17','综合维修':'#37474f','网络故障':'#004d40','饮水机故障':'#2e7d32','电梯故障':'#4e342e'};

  var typeCtx = document.getElementById('typeChart').getContext('2d');
  charts.type = new Chart(typeCtx, {
    type: 'bar',
    data: {
      labels: typeEntries.map(function(e) { return e[0]; }),
      datasets: [{ data: typeEntries.map(function(e) { return e[1]; }), backgroundColor: typeEntries.map(function(e) { return typeColors[e[0]] || '#455a64'; }), borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#78909c', maxRotation: 30 } }, y: { grid: { color: '#f5f5f5' }, ticks: { font: { size: 10 } } } }
  });

  // 完成状态
  var done = records.filter(function(r) { return r.status === '已完成'; }).length;
  var active = records.length - done;
  var statusCtx = document.getElementById('statusChart').getContext('2d');
  charts.status = new Chart(statusCtx, {
    type: 'doughnut',
    data: {
      labels: ['已完成 (' + done + ')', '处理中 (' + active + ')'],
      datasets: [{ data: [done, active], backgroundColor: ['#4caf50', '#ff9800'], borderWidth: 0, hoverOffset: 8 }]
    },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } } } }
  });

  // 时效分布
  var slaBuckets = {'当天完成':0,'1天':0,'2天':0,'3-4天':0,'5-7天':0,'8天+':0};
  records.filter(function(r) { return r.status === '已完成'; }).forEach(function(r) {
    var d = Number(r.timeliness);
    if (d === 0) slaBuckets['当天完成']++;
    else if (d === 1) slaBuckets['1天']++;
    else if (d === 2) slaBuckets['2天']++;
    else if (d <= 4) slaBuckets['3-4天']++;
    else if (d <= 7) slaBuckets['5-7天']++;
    else slaBuckets['8天+']++;
  });
  var slaColors = ['#4caf50','#8bc34a','#ff9800','#ff7043','#f44336','#b71c1c'];
  var slaCtx = document.getElementById('slaChart').getContext('2d');
  charts.sla = new Chart(slaCtx, {
    type: 'bar',
    data: {
      labels: Object.keys(slaBuckets),
      datasets: [{ label: '报修数', data: Object.values(slaBuckets), backgroundColor: slaColors, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#78909c' } }, y: { grid: { color: '#f5f5f5' }, ticks: { font: { size: 10 }, stepSize: 1 } } }
  });
}

function renderMonthlyTrend(records) {
  var monthCounts = {};
  records.forEach(function(r) {
    if (!r.date) return;
    var month = r.date.substring(0,7);
    monthCounts[month] = (monthCounts[month]||0) + 1;
  });
  var sortedMonths = Object.keys(monthCounts).sort();
  var maxCount = Math.max.apply(null, Object.values(monthCounts).concat([1]));

  var monthLabels = sortedMonths.map(function(m) {
    return parseInt(m.split('-')[1]) + '月';
  });

  document.getElementById('monthlyBars').innerHTML = sortedMonths.map(function(m, i) {
    var count = monthCounts[m];
    var height = Math.max(4, Math.round(count / maxCount * 60));
    var isCurrent = m === (new Date()).toISOString().substring(0,7);
    return '<div class="bar-wrap">' +
      '<div class="bar-count">' + count + '</div>' +
      '<div class="bar" style="height:' + height + 'px;' + (isCurrent ? 'background:linear-gradient(180deg,#ffb74d,#e65100)' : '') + '" title="' + m + ': ' + count + '条"></div>' +
      '<div class="bar-label">' + monthLabels[i] + (isCurrent ? '' : '') + '</div>' +
    '</div>';
  }).join('');
}

// ===== 启动 =====
loadData();
</script>
